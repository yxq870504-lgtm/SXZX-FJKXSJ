name: Daily Official Calendar Refresh

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh official calendar and rebuild dashboard
        env:
          DASHBOARD_REPO_DIR: ${{ github.workspace }}
          SOURCE_XLSX: ${{ github.workspace }}/data/holiday_student_analysis.xlsx
        run: python scripts/run_daily_calendar_refresh.py
